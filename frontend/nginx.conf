server {
    listen 80;
    server_name localhost;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Handle API requests
    # All requests starting with /api/v1/ will be forwarded
    # to your backend service.
    location /api/v1/ {
        # 'backend' is the name of our backend service in docker-compose.
        # Docker's internal DNS will resolve 'backend' to the
        # backend container's IP address.
        proxy_pass http://backend:8000/api/v1/;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle frontend routing
    # This ensures that refreshing a page on a React route (e.g., /dashboard)
    # still serves the index.html file.
    location / {
        try_files $uri $uri/ /index.html;
    }
}